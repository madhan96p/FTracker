<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>IPO — FTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../shared/common.css"/>
  <link rel="stylesheet" href="IPO.css"/>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-placeholder"></div>
  <div class="content-col">
    <div id="header-placeholder"></div>
    <main class="page-main">

      <div class="panel-hdr">
        <div class="panel-title">IPO Investments</div>
        <input type="text" class="input-text" id="ipoSearch" placeholder="Search company…" style="width:220px"/>
      </div>

      <!-- IPO summary strip -->
      <div class="ipo-summary" id="ipoSummary"></div>

      <div class="card" style="margin-top:.75rem">
        <div class="table-wrap">
          <table class="data-table" id="ipoTable">
            <thead>
              <tr>
                <th class="sortable" data-col="companyName">Company</th>
                <th>Ticker</th>
                <th class="sortable" data-col="date">Date</th>
                <th class="sortable" data-col="orderPrice">Issue ₹</th>
                <th class="sortable" data-col="filledQty">Allotted</th>
                <th class="sortable" data-col="currentPrice">Curr ₹</th>
                <th>Brokerage ₹</th>
                <th class="sortable" data-col="invested">Invested ₹</th>
                <th class="sortable" data-col="current">Current ₹</th>
                <th class="sortable" data-col="netPnl">Net P&amp;L</th>
                <th class="sortable" data-col="grossPnl">Gross P&amp;L</th>
                <th class="sortable" data-col="pnlPct">P&amp;L %</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="ipoTbody">
              <tr class="empty-row"><td colspan="13">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer" id="ipoFooter"></div>
      </div>

    </main>
  </div>
</div>
<div id="modal-placeholder"></div>
<script src="../shared/config.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/sheets.js"></script>
<script src="../shared/components.js"></script>
<script src="IPO.js"></script>
</body>
</html>
