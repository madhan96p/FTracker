<!-- investments/Investments.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Investments — FTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../shared/common.css"/>
  <link rel="stylesheet" href="Investments.css"/>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-placeholder"></div>
  <div class="content-col">
    <div id="header-placeholder"></div>
    <main class="page-main">
      <div class="panel-hdr">
        <div class="panel-title">Individual Investment Transactions</div>
        <input type="text" class="input-text" id="invSearch" placeholder="Search company / ticker…" style="width:220px"/>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table class="data-table" id="invTable">
            <thead>
              <tr>
                <th>Company</th><th>Ticker</th><th>Date</th>
                <th>Order ₹</th><th>Qty</th><th>Curr ₹</th>
                <th>Brokerage ₹</th><th>Invested ₹</th><th>Current ₹</th>
                <th>Net P&amp;L</th><th>Gross P&amp;L</th><th>P&amp;L %</th>
              </tr>
            </thead>
            <tbody id="invTbody">
              <tr class="empty-row"><td colspan="12">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer" id="invFooter"></div>
      </div>
    </main>
  </div>
</div>
<div id="modal-placeholder"></div>
<script src="../shared/config.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/sheets.js"></script>
<script src="../shared/components.js"></script>
<script src="Investments.js"></script>
</body>
</html>
