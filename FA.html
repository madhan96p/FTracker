<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fundamentals — FTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../shared/common.css"/>
  <link rel="stylesheet" href="FA.css"/>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-placeholder"></div>
  <div class="content-col">
    <div id="header-placeholder"></div>
    <main class="page-main">

      <div class="panel-hdr">
        <div class="panel-title">Fundamental Analysis</div>
        <div class="controls-row">
          <input type="text" class="input-text" id="faSearch" placeholder="Search ticker / company…" style="width:220px"/>
          <select class="input-select" id="faFilter">
            <option value="all">All Actions</option>
            <option value="STRONG BUY">Strong Buy</option>
            <option value="WATCHLIST">Watchlist</option>
            <option value="AVOID">Avoid</option>
          </select>
        </div>
      </div>

      <!-- Column group toggles -->
      <div class="controls-row" style="margin-top:.5rem;margin-bottom:.75rem">
        <span style="font-size:11px;color:var(--text-muted);margin-right:.25rem">Show columns:</span>
        <button class="btn-ghost col-toggle active" data-group="valuation"  style="font-size:11px;padding:.3rem .7rem">Valuation</button>
        <button class="btn-ghost col-toggle active" data-group="quality"    style="font-size:11px;padding:.3rem .7rem">Quality</button>
        <button class="btn-ghost col-toggle active" data-group="financials" style="font-size:11px;padding:.3rem .7rem">Financials</button>
        <button class="btn-ghost col-toggle active" data-group="graham"     style="font-size:11px;padding:.3rem .7rem">Graham</button>
      </div>

      <div class="card" style="overflow:hidden">
        <div class="table-wrap">
          <table class="data-table" id="faTable">
            <thead>
              <tr>
                <!-- Always visible -->
                <th class="sortable" data-col="ticker">Ticker</th>
                <th>Company</th>
                <th class="sortable" data-col="ltp">LTP ₹</th>
                <th class="sortable" data-col="healthScore">Health</th>
                <th class="sortable" data-col="finalAction">Action</th>

                <!-- Valuation group -->
                <th class="col-group-valuation sortable" data-col="pe">P/E</th>
                <th class="col-group-valuation sortable" data-col="pb">P/B</th>
                <th class="col-group-valuation sortable" data-col="peg">PEG</th>
                <th class="col-group-valuation sortable" data-col="mktCap">Mkt Cap (Cr)</th>

                <!-- Quality group -->
                <th class="col-group-quality sortable" data-col="roe">ROE %</th>
                <th class="col-group-quality sortable" data-col="roce">ROCE %</th>
                <th class="col-group-quality sortable" data-col="eps">EPS</th>
                <th class="col-group-quality sortable" data-col="promoterPct">Promoter %</th>

                <!-- Financials group -->
                <th class="col-group-financials sortable" data-col="de">D/E</th>
                <th class="col-group-financials sortable" data-col="currentRatio">Curr Ratio</th>
                <th class="col-group-financials sortable" data-col="salesGr">Sales Gr %</th>
                <th class="col-group-financials sortable" data-col="profitGr">Profit Gr %</th>
                <th class="col-group-financials sortable" data-col="divYield">Div Yield %</th>

                <!-- Graham group -->
                <th class="col-group-graham sortable" data-col="grahamNumber">Graham ₹</th>
                <th class="col-group-graham sortable" data-col="intrinsicGap">Intrinsic Gap %</th>
                <th class="col-group-graham">Yield Quality</th>
                <th class="col-group-graham">Notes</th>
              </tr>
            </thead>
            <tbody id="faTbody">
              <tr class="empty-row"><td colspan="22">Loading…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer" id="faFooter"></div>
      </div>

    </main>
  </div>
</div>
<div id="modal-placeholder"></div>
<script src="../shared/config.js"></script>
<script src="../shared/utils.js"></script>
<script src="../shared/sheets.js"></script>
<script src="../shared/components.js"></script>
<script src="FA.js"></script>
</body>
</html>
